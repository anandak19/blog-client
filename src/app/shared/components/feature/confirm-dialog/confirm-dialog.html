<h2 mat-dialog-title>Delete Article</h2>
<mat-dialog-content>
  Would you like to delete this article?
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close (click)="onNo()">No</button>
  <button matButton mat-dialog-close cdkFocusInitial (click)="onYes()">Ok</button>
</mat-dialog-actions>
